<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KKnD Animation Viewer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    #ui {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 12px;
      background: rgba(0,0,0,0.8);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      z-index: 10;
    }
    #ui label { display: flex; align-items: center; gap: 6px; }
    #ui select {
      padding: 6px 10px;
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
    }
    #ui button {
      padding: 6px 12px;
      background: #3a7bd5;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #ui button:hover { background: #4a8be5; }
    #ui button.secondary { background: #444; }
    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
    }
    .tab-bar button {
      padding: 6px 14px;
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
    }
    .tab-bar button:hover { background: #333; }
    .tab-bar button.active {
      background: #3a7bd5;
      color: white;
      border-color: #3a7bd5;
    }
    .tab-content { display: none; }
    .tab-content.active { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    #canvas-wrapper {
      position: absolute;
      top: 90px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }
    #canvas-wrapper.with-spritesheet-bar {
      top: 132px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }
    canvas {
      display: block;
      background: #222;
    }
    .configure-timeline {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      background: #222;
      border-radius: 4px;
      border: 1px solid #444;
    }
    .timeline-title {
      font-size: 11px;
      color: #888;
      margin-bottom: 6px;
    }
    #timeline-grid {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .timeline-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .timeline-layer-label {
      font-size: 10px;
      min-width: 80px;
      color: #aaa;
    }
    .timeline-cells {
      display: flex;
      gap: 2px;
    }
    .timeline-cell {
      width: 28px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      background: #333;
      color: #888;
      border-radius: 2px;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .timeline-cell.base {
      cursor: default;
      background: #2a2a2a;
      color: #666;
    }
    .timeline-cell.overlay {
      cursor: pointer;
    }
    .timeline-cell.overlay.has-block {
      background: #3a7bd5;
      color: white;
      border-color: #4a8be5;
    }
    .timeline-cell.overlay:hover {
      background: #444;
    }
    .spritesheet-tester-bar {
      position: absolute;
      top: 54px;
      left: 0;
      right: 0;
      padding: 8px 12px;
      background: rgba(0,0,0,0.6);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      z-index: 9;
      border-bottom: 1px solid #333;
    }
    .spritesheet-tester-bar label.spritesheet-layer-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="tab-bar">
      <button id="tab-sprite" class="active">Sprite Viewer</button>
      <button id="tab-units">Units</button>
      <button id="tab-effects">Effects</button>
      <button id="tab-configure">Configure</button>
      <button id="tab-spritesheet">Spritesheet Tester</button>
    </div>
    <div id="sprite-viewer-ui" class="tab-content active">
      <label>
        Sprite:
        <select id="sprite-select">
          <option value="">-- Select sprite --</option>
        </select>
      </label>
      <label>
        Direction / Anim:
        <select id="dir-select">
          <option value="all">All frames</option>
        </select>
      </label>
      <label>
        <input type="range" id="speed" min="1" max="60" value="15" />
        Speed
      </label>
      <button id="play-btn">Play</button>
      <button id="step-btn" class="secondary">Step</button>
      <span id="frame-info"></span>
    </div>
    <div id="units-ui" class="tab-content">
      <label>
        Unit:
        <select id="unit-select">
          <option value="">-- Select unit --</option>
        </select>
      </label>
      <span id="units-status">Units — 25 animations at 8 FPS (shared frame layout)</span>
    </div>
    <div id="effects-ui" class="tab-content">
      <span id="effects-status">Effects — 59 animations at 8 FPS (Extras)</span>
    </div>
    <div id="configure-ui" class="tab-content">
      <label>
        Animation to edit:
        <select id="configure-composition-select">
          <option value="">-- Select animation --</option>
        </select>
      </label>
      <label id="configure-id-label" style="display: none;">
        Composition ID: <span id="configure-id-display"></span>
      </label>
      <label id="configure-id-input-label" style="display: none;">
        Composition ID:
        <input type="text" id="composition-id" placeholder="e.g. SWAT/attack north" style="width: 180px; padding: 4px; background: #2a2a2a; color: #e0e0e0; border: 1px solid #444; border-radius: 4px;" />
      </label>
      <div class="configure-slots">
        <label>
          Slot 1:
          <select id="configure-slot-1">
            <option value="">-- None --</option>
          </select>
          Layer:
          <select id="configure-layer-1">
            <option value="0">0 (back)</option>
            <option value="1">1</option>
            <option value="2">2 (front)</option>
          </select>
          Scale:
          <input type="range" id="configure-scale-1" min="0.05" max="2" step="0.05" value="0.5" style="width: 80px;" title="Size" />
          <span id="configure-scale-val-1" style="font-size: 11px; min-width: 32px;">0.5</span>
          FPS:
          <input type="number" id="configure-fps-1" min="1" max="60" value="8" style="width: 48px; padding: 2px; background: #2a2a2a; color: #e0e0e0; border: 1px solid #444; border-radius: 4px;" />
        </label>
        <label>
          Slot 2:
          <select id="configure-slot-2">
            <option value="">-- None --</option>
          </select>
          Layer:
          <select id="configure-layer-2">
            <option value="0">0 (back)</option>
            <option value="1" selected>1</option>
            <option value="2">2 (front)</option>
          </select>
          Scale:
          <input type="range" id="configure-scale-2" min="0.05" max="2" step="0.05" value="0.2" style="width: 80px;" />
          <span id="configure-scale-val-2" style="font-size: 11px; min-width: 32px;">0.2</span>
          FPS:
          <input type="number" id="configure-fps-2" min="1" max="60" value="8" style="width: 48px; padding: 2px; background: #2a2a2a; color: #e0e0e0; border: 1px solid #444; border-radius: 4px;" />
        </label>
        <label>
          Slot 3:
          <select id="configure-slot-3">
            <option value="">-- None --</option>
          </select>
          Layer:
          <select id="configure-layer-3">
            <option value="0">0 (back)</option>
            <option value="1">1</option>
            <option value="2" selected>2 (front)</option>
          </select>
          Scale:
          <input type="range" id="configure-scale-3" min="0.05" max="2" step="0.05" value="0.2" style="width: 80px;" />
          <span id="configure-scale-val-3" style="font-size: 11px; min-width: 32px;">0.2</span>
          FPS:
          <input type="number" id="configure-fps-3" min="1" max="60" value="8" style="width: 48px; padding: 2px; background: #2a2a2a; color: #e0e0e0; border: 1px solid #444; border-radius: 4px;" />
        </label>
      </div>
      <label>
        Move layer:
        <select id="configure-move-slot">
          <option value="1">Slot 1</option>
          <option value="2">Slot 2</option>
          <option value="3">Slot 3</option>
        </select>
      </label>
      <span style="font-size: 11px; color: #888;">(arrow keys)</span>
      <button id="configure-play-btn">Play</button>
      <button id="configure-step-btn" class="secondary">Step</button>
      <button id="configure-save-btn">Save</button>
      <button id="configure-export-btn">Export Spritesheet</button>
      <span id="configure-status">Configure — select animations, drag or use arrow keys to move, save</span>
      <div id="configure-timeline" class="configure-timeline">
        <div class="timeline-title">Timeline — click cells to place overlay on base frames</div>
        <div id="timeline-grid"></div>
      </div>
    </div>
    <div id="spritesheet-tester-ui" class="tab-content"></div>
  </div>
  <div id="spritesheet-tester-bar" class="spritesheet-tester-bar" style="display: none;">
    <label>
      Spritesheet:
      <select id="spritesheet-tester-select">
        <option value="">-- Select spritesheet --</option>
      </select>
    </label>
    <label class="spritesheet-layer-toggle"><input type="checkbox" id="spritesheet-layer0-toggle" checked /> Layer 0</label>
    <label class="spritesheet-layer-toggle"><input type="checkbox" id="spritesheet-layer1-toggle" checked /> Layer 1</label>
    <span id="spritesheet-tester-status">Select a spritesheet from the dropdown to test on the map</span>
  </div>
  <div id="canvas-wrapper"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
