<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KKnD Animation Viewer</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    #ui {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 12px;
      background: rgba(0,0,0,0.8);
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      z-index: 10;
    }
    #ui label { display: flex; align-items: center; gap: 6px; }
    #ui select {
      padding: 6px 10px;
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
    }
    #ui button {
      padding: 6px 12px;
      background: #3a7bd5;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    #ui button:hover { background: #4a8be5; }
    #ui button.secondary { background: #444; }
    .tab-bar {
      display: flex;
      gap: 4px;
      margin-bottom: 8px;
    }
    .tab-bar button {
      padding: 6px 14px;
      background: #2a2a2a;
      color: #e0e0e0;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
    }
    .tab-bar button:hover { background: #333; }
    .tab-bar button.active {
      background: #3a7bd5;
      color: white;
      border-color: #3a7bd5;
    }
    .tab-content { display: none; }
    .tab-content.active { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    #canvas-wrapper {
      position: absolute;
      top: 90px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
    }
    canvas {
      display: block;
      background: #222;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div class="tab-bar">
      <button id="tab-sprite" class="active">Sprite Viewer</button>
      <button id="tab-units">Units</button>
      <button id="tab-effects">Effects</button>
    </div>
    <div id="sprite-viewer-ui" class="tab-content active">
      <label>
        Sprite:
        <select id="sprite-select">
          <option value="">-- Select sprite --</option>
        </select>
      </label>
      <label>
        Direction / Anim:
        <select id="dir-select">
          <option value="all">All frames</option>
        </select>
      </label>
      <label>
        <input type="range" id="speed" min="1" max="60" value="15" />
        Speed
      </label>
      <button id="play-btn">Play</button>
      <button id="step-btn" class="secondary">Step</button>
      <span id="frame-info"></span>
    </div>
    <div id="units-ui" class="tab-content">
      <label>
        Unit:
        <select id="unit-select">
          <option value="">-- Select unit --</option>
        </select>
      </label>
      <span id="units-status">Units — 25 animations at 8 FPS (shared frame layout)</span>
    </div>
    <div id="effects-ui" class="tab-content">
      <span id="effects-status">Effects — 59 animations at 8 FPS (Extras)</span>
    </div>
  </div>
  <div id="canvas-wrapper"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
